services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  rag-service:
    build: ./rag-service
    ports:
      - "8000:8000"
    env_file:
      - rag-service/.env
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: clicky-knowledge
      DATA_DIR: /data
    volumes:
      - rag-data:/data
    depends_on:
      - minio
    restart: unless-stopped

  worker:
    build: ./worker
    ports:
      - "8787:8787"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-unused}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-unused}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY:-unused}
      RAG_SERVICE_URL: http://rag-service:8000
    depends_on:
      - rag-service
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "4000:3000"
    environment:
      RAG_SERVICE_URL: http://rag-service:8000
    depends_on:
      - rag-service
    restart: unless-stopped

volumes:
  minio-data:
  rag-data:
